apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: orders-service-policy
  namespace: shopflow-dev
spec:
  podSelector:
    matchLabels:
      app: orders-service    # this policy applies to orders-service pods

  policyTypes:
    - Ingress              # control who can send TO orders-service
