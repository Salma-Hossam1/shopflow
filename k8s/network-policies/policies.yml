---
# policies for services to talk to db , dns , ingress-controller (ingress-nginx-controller) and each other
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: auth-service-policy
  namespace: shopflow-dev
spec:
  podSelector:
    matchLabels:
      app: auth-service    # this policy applies to auth-service pods

  policyTypes:
    - Ingress              # control who can send TO auth-service
    - Egress               # control who auth-service can send TO

  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/component: controller
          # namespaceSelector — match by namespace, not pod label
          # ingress-nginx is a different namespace so we can't use podSelector alone
          # kubernetes.io/metadata.name is automatically set on every namespace
      ports:
        - port: 3001       # auth-service listens on 3001

  egress:
    # 1. allow auth-service to talk to auth-db
    - to:
        - podSelector:
            matchLabels:
              app: auth-db
      ports:
        - port: 5432       # Postgres port

    # 2. allow DNS resolution — without this, "auth-db" can't be resolved to an IP
    # every service needs this or pod-to-pod by name breaks completely
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP    # DNS uses UDP by default
        - port: 53
          protocol: TCP    # DNS falls back to TCP for large responses

