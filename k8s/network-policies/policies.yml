apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: auth-db-policy
  namespace: shopflow-dev
spec:
  podSelector:
    matchLabels:
      app: auth-db
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: auth-service
      ports:
        - port: 5432

