apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service-deployment
  namespace: shopflow-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      serviceAccountName: auth-service-sa
      nodeSelector:
        shopflow/role: storage

      securityContext:        # pod level — who runs the pod
        runAsNonRoot: true    # reject if image tries to run as root
        runAsUser: 1000       # force UID 1000 (matches appuser in Dockerfile)
        fsGroup: 2000         # volume files owned by group 2000

      containers:
        - name: auth-service
          image: salmahossam12/shopflow-auth-service:latest
          ports:
            - containerPort: 3001

          securityContext:                   # container level — how it runs
            allowPrivilegeEscalation: false  # can't gain more privileges
            readOnlyRootFilesystem: true     # filesystem is read-only
            capabilities:                   # capabilities only at container level
              drop:
                - ALL                       # drop every linux capability

          env:
            - name: PORT
              value: "3001"
            - name: DB_HOST
              value: "auth-db"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "authdb"
            - name: DB_USER
              value: "authuser"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: JWT_SECRET
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-db-secret
                  key: POSTGRES_PASSWORD

          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 100m

          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp   # writable exception for Node.js temp files

      volumes:
        - name: tmp-volume
          emptyDir: {}          # temporary, deleted when pod stops

---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: shopflow-dev
spec:
  type: ClusterIP
  selector:
    app: auth-service
  ports:
    - port: 3001
      targetPort: 3001