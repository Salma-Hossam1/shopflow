apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-db-deployment
  namespace: shopflow-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-db        
  template:
    metadata:
      labels:
        app: auth-db     
    spec:
      nodeSelector:
        shopflow/role: storage      
      containers:
        - name: postgres
          image: postgres:16-alpine
          envFrom:
            - secretRef:
                name: auth-db-secret  
          resources:
            requests:
              memory: 64Mi          
              cpu: 50m               
            limits:
              memory: 256Mi
              cpu: 150m
          volumeMounts:
            - name: auth-db-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: auth-db-storage
          persistentVolumeClaim:
            claimName: auth-pvc   

---
apiVersion: v1
kind: Service
metadata:
  name: auth-db
  namespace: shopflow-dev
spec:
  type: ClusterIP
  selector:
    app: auth-db
  ports:
    - port: 5432
      targetPort: 5432