---
# roles/common/tasks/redhat.yml
# Called automatically when ansible_os_family == "RedHat"
# Covers: RHEL, CentOS, Fedora, Rocky Linux, AlmaLinux

- name: Install base packages (RedHat/CentOS/Fedora)
  dnf:
    name:
      - curl
      - wget
      - git
      - ca-certificates
      - gnupg2
      - python3-pip
    state: present
  become: yes