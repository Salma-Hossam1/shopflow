name: CI
on:
    push:
        branches: [master]
        paths:
        - 'auth-service/**'
        - 'products-service/**'
        - 'orders-service/**'
        - '.github/workflows/**'  # re-run if workflow itself changes
    pull_request:
        branches: [master]
        paths:
        - 'auth-service/**'
        - 'products-service/**'
        - 'orders-service/**'

jobs:
    build-test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout the code
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'

            - name: Test auth-service
              run: cd auth-service && npm ci && npm test

            - name: Test products-service
              run: cd products-service && npm ci && npm test

            - name: Test orders-service
              run: cd orders-service && npm ci && npm test

    trigger-jenkins:
        needs: build-test    # only runs if test job passes
        runs-on: ubuntu-latest
        steps:
            - name: Trigger Jenkins pipeline
              run: |
                curl -X POST "${{ secrets.JENKINS_URL }}/job/shopflow/build?token=${{ secrets.JENKINS_BUILD_TOKEN }}" \
                --user "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_TOKEN }}"